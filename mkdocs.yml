site_name: FlowAgent Documentation
site_description: An advanced multi-agent framework for automating complex bioinformatics workflows
site_author: Cribbs Lab

repo_url: https://github.com/cribbslab/flowagent
repo_name: cribbslab/flowagent

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cribbslab/flowagent
  version:
    provider: mike

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # mkdocstrings inserts each path on sys.path. We want
          # ``flowagent`` to be importable, so we add the REPO ROOT
          # (which contains the ``flowagent/`` package), not the package
          # directory itself.
          paths: ["."]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_bases: true
  - autorefs

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - admonition
  - footnotes
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Workflows:
    - Overview: workflows/index.md
    - RNA-seq: workflows/rna-seq.md
    - ChIP-seq: workflows/chip-seq.md
    - Hi-C: workflows/hi-c.md
    - ATAC-seq: workflows/atac-seq.md
    - Example Prompts: workflows/example-prompts.md
  - User Guide:
    - Concepts: user-guide/concepts.md
    - CLI Reference: user-guide/cli-reference.md
    - LLM Providers: user-guide/llm-providers.md
    - Workflow Presets: user-guide/presets.md
    - Pipeline Generation: user-guide/pipeline-generation.md
    - Execution Backends: user-guide/executors.md
    - Error Recovery: user-guide/error-recovery.md
    - State Management: user-guide/state-management.md
    - HPC Configuration: user-guide/hpc.md
    - Web Interface: user-guide/web-interface.md
    - Analysis Reports: user-guide/analysis.md
    - Version Compatibility: user-guide/version-compatibility.md
  - Custom Scripts:
    - Overview: custom_scripts/index.md
    - Adding Scripts: custom_scripts/adding-scripts.md
    - Script Requirements: custom_scripts/requirements.md
    - Examples:
      - RNA-seq Normalization: custom_scripts/examples/rna-seq-norm.md
      - ChIP-seq Peak Analysis: custom_scripts/examples/chip-seq-peaks.md
      - Data Cleanup: custom_scripts/examples/data-cleanup.md
  - Benchmarking: benchmarking.md
  - API Reference:
    - Overview: reference/index.md
    - Script Manager: api/script-manager.md
    - Workflow Executor: api/workflow-executor.md
    - Auto-generated:
      - CLI: reference/flowagent/cli.md
      - Settings: reference/flowagent/config/settings.md
      - LLM Interface: reference/flowagent/core/llm.md
      - Workflow Manager: reference/flowagent/core/workflow_manager.md
      - Workflow DAG: reference/flowagent/core/workflow_dag.md
      - Workflow State: reference/flowagent/core/workflow_state.md
      - Agent System: reference/flowagent/core/agent_system.md
      - Agent Types: reference/flowagent/core/agent_types.md
      - Executors: reference/flowagent/core/executors.md
      - Knowledge Base: reference/flowagent/core/knowledge.md
      - Tool Tracker: reference/flowagent/core/tool_tracker.md
      - LLM Agent: reference/flowagent/agents/llm_agent.md
      - Report Generator: reference/flowagent/analysis/report_generator.md
      - Metrics: reference/flowagent/monitoring/metrics.md
      - Command Utils: reference/flowagent/utils/command.md
      - File Utils: reference/flowagent/utils/file_utils.md
      - Logging: reference/flowagent/utils/logging.md
  - Contributing: contributing.md
  - Changelog: changelog.md
