  # ═════════════════════════════════════════════════════════════

  # ── GPT-5.4 family (flagship, released March 2026) ─────────
  - id: gpt-5.4
    provider: openai
    env_var: OPENAI_API_KEY
    family: gpt-5.4
    tier: current
    context_k: 270
    pricing: {input_per_1k: 0.0025, output_per_1k: 0.0150}

