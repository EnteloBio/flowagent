# LLM providers and models to sweep across during Benchmark A.
#
# Pricing is USD per 1,000 tokens; update when provider pricing changes.
# Add a model entry only if you have the corresponding API key — the harness
# raises a clear error if the env_var listed below is unset.
#
# To add a local Ollama model, append:
#     - id: llama3.1:70b
#       provider: ollama
#       env_var: null
#       base_url: http://localhost:11434
#       pricing: {input_per_1k: 0.0, output_per_1k: 0.0}
#
# Tier semantics (matches provider docs as of April 2026):
#   current    — actively supported, flagship or mainline.
#   preview    — published preview release (not GA; may change).
#   legacy     — older generation, still callable, superseded by newer models.
#   deprecated — scheduled for retirement; intentionally excluded from this list.
#
# Fields: id, provider, env_var, family, tier, context_k, pricing, [notes].
# The harness reads provider/env_var/pricing; the other fields are metadata
# used by the plotting code and manuscript tables.

defaults:
  timeout_seconds: 300
  max_retries: 3

models:

  # ═════════════════════════════════════════════════════════════
