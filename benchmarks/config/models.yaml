  # mirror the live model list returned by ``GET /v1/models`` as of
  # April 2026. Pricing is Anthropic's published rate per MTok as of
  # this update (verify at https://www.anthropic.com/pricing before a
  # manuscript submission; rates have shifted before).

  - id: claude-opus-4-20250514         # Opus 4 original ($15/$75 per MTok)
