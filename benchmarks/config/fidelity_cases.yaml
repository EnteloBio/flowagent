# Benchmark F — Output fidelity cases.
#
# Each case names a published bioinformatics dataset, the FlowAgent prompt
# that should reproduce its primary analysis, the path to a reference
# output table from the original publication, and a comparison method.
#
# The fidelity runner does NOT execute the workflow itself — it is a
# pure scoring layer. Run FlowAgent end-to-end on the prompt first
# (or use a prior run dir), then point ``--candidate-dir`` at the
# results directory containing the file specified by ``output_relpath``.
#
# References are not committed to the repo (some are large, some have
# license uncertainty). Run ``make references`` (or
# ``python benchmarks/references/download_references.py``) to materialise
# the ``references/`` tree before scoring.
#
# Comparison methods:
#   de_table      — Spearman ρ on log2FoldChange across genes present in
#                   both tables; Jaccard on top-N significant genes
#                   (padj < ``alpha``, |log2FC| > ``min_lfc``).
#   peak_bed      — Jaccard on intervals (50% reciprocal overlap).
#   vcf           — F1 on (chrom, pos, ref, alt) tuples.

cases:

  # ── 1. RNA-seq DE: dexamethasone vs untreated airway SMC ─────────
  - id: gse52778_dex_de
    description: >-
      Dexamethasone vs untreated airway smooth muscle (Himes et al. 2014).
      Reference DE table is re-derived from the canonical ``airway``
      Bioconductor dataset using a frozen DESeq2 recipe — see
      references/make_reference_gse52778.R.
    accession: GSE52778
    organism: Homo sapiens (GRCh38)
    prompt: |-
      Download GSE52778 from GEO and run a human (GRCh38) RNA-seq
      kallisto pipeline on the bulk samples, then run DESeq2 differential
      expression between Dexamethasone and untreated conditions, with
      untreated as the reference.
    output_relpath: results/rna_seq_kallisto/deseq2/deseq2_results.csv
    reference: references/gse52778_himes_DE.tsv
    reference_source:
      kind: r_script
      script: references/make_reference_gse52778.R
      bioc_packages: [airway, DESeq2]
    comparison: de_table
    params:
      gene_id_column: gene_id
      log2fc_column:  log2FoldChange
      padj_column:    padj
      alpha:          0.05
      min_lfc:        1.0
      top_n:          200

  # ── 2. RNA-seq DE: mouse mammary luminal vs basal lineages ───────
  - id: gse60450_mammary_de
    description: >-
      Fu et al. 2015 mouse mammary RNA-seq (luminal vs basal). The
      reference DE table is re-derived from the GEO-deposited counts
      using a frozen edgeR/limma-voom recipe (the canonical analysis
      from the RNAseq123 Bioconductor workflow).
    accession: GSE60450
    organism: Mus musculus (GRCm38)
    prompt: |-
      Download GSE60450 from GEO, align mouse RNA-seq reads to GRCm38,
      and run differential expression between the basal and luminal
      mammary cell populations, with luminal as the reference.
    output_relpath: results/rna_seq/de_results.csv
    reference: references/gse60450_fu_DE.tsv
    reference_source:
      kind: r_script
      script: references/make_reference_gse60450.R
      bioc_packages: [edgeR, limma, Glimma]
    comparison: de_table
    params:
      gene_id_column: gene_id
      log2fc_column:  log2FoldChange
      padj_column:    padj
      alpha:          0.05
      min_lfc:        1.0
      top_n:          200

  # ── 3. RNA-seq DE: COVID-19 vs healthy whole-blood ───────────────
  - id: gse152418_covid_blood_de
    description: >-
      Arunachalam et al. 2020 (Science) — whole-blood RNA-seq from
      16 COVID-19 patients vs 17 age- and sex-matched healthy
      controls. Reference DE table is re-derived from the GEO-deposited
      raw counts (no recount3 / external integration required).
      ``Healthy = ref``.
    accession: GSE152418
    organism: Homo sapiens (GRCh38; Ensembl gene IDs)
    prompt: |-
      Download GSE152418 from GEO and run a human RNA-seq differential
      expression analysis with DESeq2 between the COVID-19 patient
      samples and the age- and sex-matched healthy controls, with
      healthy as the reference level.
    output_relpath: results/rna_seq/de_results.csv
    reference: references/gse152418_covid_blood_DE.tsv
    reference_source:
      kind: r_script
      script: references/make_reference_gse152418.R
      bioc_packages: [DESeq2]
    comparison: de_table
    params:
      gene_id_column: gene_id
      log2fc_column:  log2FoldChange
      padj_column:    padj
      alpha:          0.05
      min_lfc:        1.0
      top_n:          200

  # ── 4. ChIP-seq peaks: ENCODE SUZ12 in H1-hESC ──────────────────
  - id: encsr000euq_suz12_h1
    description: >-
      ENCODE SUZ12 ChIP-seq in H1-hESC (ENCSR000EUQ; PRC2 component
      involved in H3K27me3 deposition during pluripotency exit).
      Reference is the optimal IDR-thresholded peaks (ENCFF938PCI) —
      ENCODE's default-pipeline output, narrowPeak format, GRCh38.
    accession: ENCSR000EUQ
    organism: Homo sapiens (GRCh38)
    prompt: |-
      Download the SUZ12 ChIP-seq experiment ENCSR000EUQ from ENCODE
      and run a standard bowtie2 + MACS2 narrow-peak-calling pipeline
      on GRCh38 against the matched control input, with IDR-style
      replicate-consistency filtering at q<0.05.
    output_relpath: results/macs2/peaks.narrowPeak
    reference: references/encsr000euq_suz12_idr_peaks.narrowPeak
    reference_source:
      kind: direct_url
      url: https://www.encodeproject.org/files/ENCFF938PCI/@@download/ENCFF938PCI.bed.gz
      gunzip_to: references/encsr000euq_suz12_idr_peaks.narrowPeak
      sha256: null   # set after first download to pin
    comparison: peak_bed
    params:
      min_overlap: 0.5

  # ── 5. ChIP-seq peaks: ER-α in MCF7 (Ross-Innes 2012) ────────────
  - id: gse32222_er_chip
    description: >-
      ER ChIP-seq from Ross-Innes et al. 2012 (Nature). Reference is a
      single canonical GEO-deposited MACS peak call (GSM798425), pulled
      directly from NCBI and converted to a 3-column BED via the
      ``macs_txt_to_bed.py`` post-process. Using one curated sample
      rather than a DiffBind-derived consensus avoids the heavy
      DiffBind dependency for this case.
    accession: GSE32222
    organism: Homo sapiens (hg19)
    prompt: |-
      Download the MCF7 ER-α ChIP-seq dataset GSE32222 and run a
      bowtie2 + MACS2 narrow-peak-calling pipeline against the
      matched input controls.
    output_relpath: results/macs2/peaks.bed
    reference: references/gse32222_er_canonical.bed
    reference_source:
      kind: direct_url
      url: https://ftp.ncbi.nlm.nih.gov/geo/samples/GSM798nnn/GSM798425/suppl/GSM798425_SLX-2943.469.s_2_SLX-2574.433.s_2_peaks.txt.gz
      gunzip_to: references/_gsm798425_macs.txt
      post_process: references/macs_txt_to_bed.py
    comparison: peak_bed
    params:
      min_overlap: 0.5

  # ── 6. ATAC-seq peaks: Corces immune cell atlas ──────────────────
  - id: gse74912_atac_immune
    description: >-
      Corces et al. 2016 ATAC-seq across sorted human immune subsets
      (HSC, MPP, CMP, GMP, MEP, CD4 T, CD8 T, B, NK, Mono). Reference
      is the consensus peak set deposited at NCBI GEO as the first
      three columns of ``GSE74912_ATACseq_All_Counts.txt.gz`` —
      ``Chr Start End`` define the consensus peaks; the remaining
      columns are per-sample counts (which we discard).
    accession: GSE74912
    organism: Homo sapiens (hg19)
    prompt: |-
      Download GSE74912 (Corces 2016) and run a standard ATAC-seq
      pipeline (bowtie2 + MACS2 broad-peak-calling) on a single
      lineage of your choice, producing a high-confidence peak set.
    output_relpath: results/macs2/peaks.bed
    reference: references/gse74912_corces_consensus.bed
    reference_source:
      kind: direct_url
      url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE74nnn/GSE74912/suppl/GSE74912_ATACseq_All_Counts.txt.gz
      gunzip_to: references/_gse74912_counts.tsv
      post_process: references/counts_tsv_to_bed.py
    comparison: peak_bed
    params:
      min_overlap: 0.5

  # ── 7. Germline variant calling: GIAB NA12878 chr20 truth ────────
  - id: giab_na12878_chr20
    description: >-
      Genome in a Bottle NA12878 (HG001) chr20 truth set, NIST v4.2.1.
      Reference VCF + high-confidence BED are downloaded directly from
      the GIAB FTP. Comparison restricts variants to the
      high-confidence regions and excludes structural variants.
    accession: NA12878-HG001-chr20
    organism: Homo sapiens (GRCh38)
    prompt: |-
      Run BWA-MEM alignment of the NA12878 chr20 reads to GRCh38, mark
      duplicates, and call germline variants with GATK HaplotypeCaller;
      apply VQSR-style filtering and produce a final VCF restricted to
      chr20.
    output_relpath: results/gatk/filtered.vcf.gz
    reference: references/giab_na12878_chr20_truth.vcf.gz
    reference_source:
      kind: direct_url
      url: https://ftp-trace.ncbi.nlm.nih.gov/giab/ftp/release/NA12878_HG001/NISTv4.2.1/GRCh38/HG001_GRCh38_1_22_v4.2.1_benchmark.vcf.gz
      post_process: references/subset_giab_chr20.sh
    comparison: vcf
    params:
      region: "chr20"
